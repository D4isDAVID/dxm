# Endpoints
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"
sv_master1 "https://servers-frontend.fivem.net/api/serverlist/ingress"
sv_master2 ""
sv_master3 ""
steam_webApiDomain "api.steampowered.com"

# Listing
sv_lan false
sv_hostname "dxm - FXServer Default"
sv_maxClients 30
sets sv_projectName "[dxm] FXServer Default"
sets sv_projectDesc "A default FXServer built with dxm."
sets locale "root-AQ"
sets tags "default, dxm"

# Connection
net_tcpConnLimit 16
netPort 30120
sv_maxClientEndpointRequestSize 102400
sv_registerMulticastDns true
sv_tcpConnectionTimeoutSeconds 5
sv_threadedClientHttp true

# HTTP
set rateLimiter_http_info_burst 10.000000
set rateLimiter_http_info_rate 4.000000
set rateLimiter_http_perf_burst 5.000000
set rateLimiter_http_perf_rate 2.000000
sv_endpointPrivacy true
sv_exposePlayerIdentifiersInHttpEndpoint false
sv_httpHandlerConnectionTimeoutSeconds 300
sv_netHttp2 false
sv_requestParanoia 0

# CNL
sv_kick_players_cnl true
sv_kick_players_cnl_consecutive_failures 2
sv_kick_players_cnl_timeout_sec 140
sv_kick_players_cnl_update_rate_sec 60
sv_kick_players_cnl_verbose 1

# OneSync
onesync_logFile ""

# Mono Runtime
mono_enableMemoryUsageTracking true

# txAdmin
setr txAdmin-debugMode false

# Mumble
mumble_allowExternalConnections false
mumble_disableServer false
mumble_logLevel 0
mumble_maxClientsPerIP 32

# Proxy
sv_endpoints ""
sv_forceIndirectListing false
sv_listingHostOverride ""
sv_listingIpOverride ""
sv_proxyIPRanges "10.0.0.0/8 127.0.0.0/8 192.168.0.0/16 172.16.0.0/12"
