exec secrets.cfg

# Game
gamename "gta5"
sv_enforceGameBuild 3258
sv_pureLevel 0
sv_replaceExeToSwitchBuilds false
sv_scriptHookAllowed false

# Server
sv_disableClientReplays false
sv_enableNetworkedPhoneExplosions false
sv_enableNetworkedScriptEntityStates true
sv_enableNetworkedSounds true
sv_entityLockdown "inactive"
sv_filterRequestControl 0
sv_filterRequestControlSettleTimer 30000
sv_protectServerEntities false
sv_stateBagStrictMode false
sv_useAccurateSends true

# Latent Events
sv_enableNetEventReassembly true
sv_netEventReassemblyMaxPendingEvents 100
sv_netEventReassemblyUnlimitedPendingEvents false

# Auth
sv_authMaxVariance 5
sv_authMinTrust 1
sv_enforceSteamAuth false

# OneSync
onesync_automaticResend false
onesync_distanceCulling true
onesync_distanceCullVehicles false
onesync_forceMigration true
onesync_population true
onesync_radiusFrequency true
onesync_workaround763185 false

# txAdmin
setr txAdmin-menuPlayerIdDistance 150
setr txAdmin-menuDrunkDuration 30
setr txAdmin-menuAnnnonunceNotiPos top-center

exec resources.cfg
exec permissions.cfg
exec env.cfg
