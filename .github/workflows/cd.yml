name: CD

on:
  push:
    branches:
      - main
    tags:
      - '**'

permissions:
  contents: read

jobs:
  artifact:
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - type: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl

    name: Upload Artifact (${{ matrix.type }})
    runs-on: ${{ matrix.os }}
    container: ${{ contains(matrix.target, 'musl') && 'ghcr.io/blackdex/rust-musl:x86_64-musl' || null }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          cargo build --verbose --locked --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: dxm-${{ matrix.type }}
          path: ./target/${{ matrix.target }}/release/dxm${{ runner.os == 'Windows' && '.exe' || '' }}

  release:
    name: Draft Release
    runs-on: ubuntu-latest
    needs: artifact
    if: ${{ github.ref_type == 'tag' }}
    permissions:
      contents: write
    steps:
      - name: Download archives
        uses: actions/download-artifact@v7

      - name: Archive
        shell: bash
        run: |
          version="${{ github.ref_name }}"

          for file in *; do
            pushd "$file"
            if [[ "$file" == *"-windows-"* ]]; then
              zip "../dxm-$version-${file:4}.zip" "dxm.exe"
            else
              tar -czvf "../dxm-$version-${file:4}.tar.gz" "dxm"
            fi
            popd
          done

      - name: Draft release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          files: |
            ./*.zip
            ./*.tar.gz

  crates:
    name: Publish Crates
    runs-on: ubuntu-latest
    needs: release
    if: ${{ github.ref_type == 'tag' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates
        uses: katyo/publish-crates@v2
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push (Branch)
        uses: docker/build-push-action@v7
        if: ${{ github.ref_type == 'branch' }}
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/dxm:dev
            ghcr.io/${{ vars.GHCR_USERNAME }}/dxm:dev

      - name: Build and push (Tag)
        uses: docker/build-push-action@v7
        if: ${{ github.ref_type == 'tag' }}
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/dxm:${{ github.ref_name }}
            ${{ vars.DOCKERHUB_USERNAME }}/dxm:latest
            ghcr.io/${{ vars.GHCR_USERNAME }}/dxm:${{ github.ref_name }}
            ghcr.io/${{ vars.GHCR_USERNAME }}/dxm:latest
